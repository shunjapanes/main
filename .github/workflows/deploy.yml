name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & Build
        run: |
          cd client
          npm ci
          npm run build

      - name: Deploy to gh-pages
        run: |
          cp client/dist/index.html /tmp/index.html
          cp -r client/dist/assets /tmp/assets
          cp client/public/editor.html /tmp/editor.html
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages
          git checkout gh-pages
          cp /tmp/index.html .
          cp -r /tmp/assets .
          cp /tmp/editor.html .
          git add index.html assets editor.html
          git diff --staged --quiet || git commit -m "deploy: auto-build from main"
          git push origin gh-pages
